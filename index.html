<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IANA PRADO | VIP Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            /* Dourado Premium */
            --bg: #050505;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: linear-gradient(to top, #000 0%, #1a1a1a 100%);
        }

        .container {
            width: 100%;
            max-width: 400px;
            /* Caixinha limite pro celular */
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Foto centralizada com blur moderado */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 180px;
            /* Foto grande no meio */
            height: 180px;
            border-radius: 50%;
            /* Redonda */
            border: 3px solid var(--primary);
            /* Borda Dourada */
            padding: 4px;
            object-fit: cover;
            filter: blur(2px) brightness(0.9);
            /* Um pouco fosca/blur */
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.4);
            transition: filter 0.3s ease;
        }

        /* Tira o fosco se a pessoa segurar o dedo em cima (opcional) */
        .profile-img:active {
            filter: blur(0px) brightness(1.1);
        }

        .verified-badge {
            position: absolute;
            bottom: 8px;
            right: 15px;
            background: #0088cc;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid var(--bg);
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 5px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: var(--primary);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 600;
        }


        /* Botões no meio da tela */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 15px;
            /* Ajuste pros textos caberem (menos padding lateral) */
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            /* Ajuste pra caber na caixinha */
            transition: all 0.3s ease;
            width: 100%;
            /* Ocupar 100% da max-width */
            box-sizing: border-box;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-fanvue {
            background: #ffffff;
            color: #000000;
        }

        .btn-cakto {
            background: #d4af37;
            /* Dourado */
            color: #000000;
        }

        .btn-icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #444;
        }


        /* Ajuste de responsividade (Celulares Pequenos) */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .profile-img {
                width: 150px;
                /* Foto um pouco menor no cel */
                height: 150px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .tagline {
                font-size: 0.85rem;
                margin-bottom: 30px;
            }

            .btn {
                padding: 14px 10px;
                font-size: 0.85rem;
                border-radius: 10px;
            }

            .btn-icon {
                font-size: 1rem;
                margin-right: 6px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- FOTO CENTRAL GRANDE E UM POUCO FOSCA -->
        <div class="profile-wrapper">
            <img src="WhatsApp Image 2026-03-07 at 22.53.09.jpeg" alt="Iana Prado" class="profile-img">
            <div class="verified-badge">✓</div>
        </div>

        <h1>IANA PRADO</h1>
        <div class="tagline">Conteúdo Sem Censura</div>

        <!-- BOTÕES ALINHADOS -->
        <div class="links-wrapper">
            <!-- FANVUE (DÓLAR) -->
            <a href="https://www.fanvue.com/iana_prado" class="btn btn-fanvue" target="_blank">
                <span class="btn-icon">💎</span> GLOBAL ACCESS (DÓLAR $)
            </a>

            <!-- CAKTO CHECKOUT (REAL/PIX) -->
            <a href="https://pay.cakto.com.br/3enojdd_306273" class="btn btn-cakto" target="_blank">
                <span class="btn-icon">🇧🇷</span> VIP BRASIL (VIA PIX)
            </a>
        </div>

        <div class="footer">
            2026 © IANA PRADO • CONTEÚDO PROTEGIDO
        </div>
    </div>

</body>

</html>
